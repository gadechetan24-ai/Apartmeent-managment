<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ApartEase — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0e1a;
      --surface: rgba(255,255,255,0.05);
      --border: rgba(255,255,255,0.10);
      --accent: #6c9fff;
      --accent2: #a78bfa;
      --text: #e8eaf0;
      --muted: #8892a4;
      --danger: #ff6b6b;
      --success: #4ade80;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .bg-blobs { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
    .blob { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.18; animation: float 12s ease-in-out infinite; }
    .blob-1 { width: 500px; height: 500px; background: #6c9fff; top: -150px; left: -100px; }
    .blob-2 { width: 400px; height: 400px; background: #a78bfa; bottom: -120px; right: -80px; animation-delay: -4s; }
    .blob-3 { width: 300px; height: 300px; background: #34d399; top: 40%; left: 60%; animation-delay: -8s; }

    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(30px, -20px) scale(1.05); }
      66% { transform: translate(-20px, 15px) scale(0.97); }
    }

    .page-wrap {
      position: relative; z-index: 1;
      display: grid;
      grid-template-columns: 1fr 420px;
      width: min(960px, 95vw);
      min-height: 560px;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 40px 80px rgba(0,0,0,0.6), 0 0 0 1px var(--border);
    }

    .promo {
      background: linear-gradient(135deg, rgba(108,159,255,0.15), rgba(167,139,250,0.12));
      backdrop-filter: blur(20px);
      border-right: 1px solid var(--border);
      padding: 60px 48px;
      display: flex; flex-direction: column; justify-content: center;
    }

    .brand { display: flex; align-items: center; gap: 12px; margin-bottom: 48px; }
    .brand-icon { width: 44px; height: 44px; border-radius: 12px; background: linear-gradient(135deg, var(--accent), var(--accent2)); display: flex; align-items: center; justify-content: center; font-size: 22px; }
    .brand-name { font-family: 'DM Serif Display', serif; font-size: 1.6rem; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

    .promo h1 { font-family: 'DM Serif Display', serif; font-size: 2.6rem; line-height: 1.2; margin-bottom: 20px; }
    .promo h1 em { font-style: italic; color: var(--accent); -webkit-text-fill-color: var(--accent); }
    .promo p { color: var(--muted); line-height: 1.7; font-size: 0.95rem; margin-bottom: 40px; }

    .feature-list { list-style: none; display: flex; flex-direction: column; gap: 14px; }
    .feature-list li { display: flex; align-items: center; gap: 12px; font-size: 0.875rem; color: var(--muted); }
    .feat-icon { width: 32px; height: 32px; border-radius: 8px; background: rgba(108,159,255,0.12); border: 1px solid rgba(108,159,255,0.2); display: flex; align-items: center; justify-content: center; }

    .form-side { background: rgba(10, 14, 26, 0.85); backdrop-filter: blur(40px); padding: 56px 48px; display: flex; flex-direction: column; justify-content: center; }
    .form-side h2 { font-family: 'DM Serif Display', serif; font-size: 1.8rem; margin-bottom: 8px; }
    .form-sub { color: var(--muted); font-size: 0.875rem; margin-bottom: 36px; }
    .form-sub a { color: var(--accent); text-decoration: none; }

    .form-group { margin-bottom: 20px; }
    label { display: block; font-size: 0.8rem; font-weight: 600; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }

    .input-wrap { position: relative; }
    .input-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); font-size: 16px; }
    input { width: 100%; padding: 13px 16px 13px 44px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; color: var(--text); outline: none; transition: 0.2s; }
    input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(108,159,255,0.15); }

    .btn-primary { width: 100%; padding: 14px; background: linear-gradient(135deg, var(--accent), var(--accent2)); border: none; border-radius: 10px; color: #fff; font-weight: 600; cursor: pointer; transition: 0.2s; margin-top: 8px; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .btn-primary:hover { opacity: .9; transform: translateY(-1px); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

    .spinner { width: 18px; height: 18px; border: 2px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; animation: spin .6s linear infinite; display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .alert { padding: 12px 16px; border-radius: 10px; font-size: 0.875rem; margin-bottom: 16px; display: none; }
    .alert-error { background: rgba(255,107,107,.12); border: 1px solid rgba(255,107,107,.3); color: #ff9999; }
    .alert-success { background: rgba(74,222,128,.12); border: 1px solid rgba(74,222,128,.3); color: #6ee7a0; }

    @media (max-width: 720px) { .page-wrap { grid-template-columns: 1fr; } .promo { display: none; } }
  </style>
</head>
<body>
  <div class="bg-blobs"><div class="blob blob-1"></div><div class="blob blob-2"></div><div class="blob blob-3"></div></div>

  <div class="page-wrap">
    <div class="promo">
      <div class="brand"><div class="brand-icon">🏢</div><span class="brand-name">ApartEase</span></div>
      <h1>Manage your<br/><em>properties</em><br/>effortlessly.</h1>
      <p>Modern property management for modern landlords.</p>
      <ul class="feature-list">
        <li><div class="feat-icon">🏠</div>Buildings & Units</li>
        <li><div class="feat-icon">💳</div>Rent Payments</li>
        <li><div class="feat-icon">🔧</div>Maintenance</li>
      </ul>
    </div>

    <div class="form-side">
      <h2>Welcome back</h2>
      <p class="form-sub">New here? <a href="/register">Sign up</a></p>

      <div id="alertBox" class="alert"></div>

      <form id="loginForm" onsubmit="event.preventDefault(); handleLogin();">
        <div class="form-group">
          <label>Username</label>
          <div class="input-wrap">
            <span class="input-icon">👤</span>
            <input type="text" id="username" placeholder="Enter username" required/>
          </div>
        </div>

        <div class="form-group">
          <label>Password</label>
          <div class="input-wrap">
            <span class="input-icon">🔒</span>
            <input type="password" id="password" placeholder="••••••••" required/>
          </div>
        </div>

        <button type="submit" class="btn-primary" id="loginBtn">
          <div class="spinner" id="spinner"></div>
          <span id="btnText">Sign In</span>
        </button>
      </form>
    </div>
  </div>

  <script>
const API =
  window.location.hostname === "localhost" ||
  window.location.hostname === "127.0.0.1"
    ? "http://127.0.0.1:8000"
    : "https://apartmeent-managment.onrender.com";

function showAlert(msg, type = 'error') {
  const box = document.getElementById('alertBox');
  box.textContent = msg;
  box.className = `alert alert-${type}`;
  box.style.display = 'block';
}

async function handleLogin() {
  const email = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;

  const btn = document.getElementById('loginBtn');
  const spinner = document.getElementById('spinner');
  const btnText = document.getElementById('btnText');

  if (!email || !password) {
    showAlert('Please fill all fields');
    return;
  }

  btn.disabled = true;
  spinner.style.display = 'block';
  btnText.textContent = 'Authenticating...';

  try {
    const response = await fetch(`${API}/api/users/login`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        email: email,
        password: password
      })
    });

    const data = await response.json();

    if (!response.ok) {
      throw new Error(
        typeof data.detail === 'string'
          ? data.detail
          : JSON.stringify(data.detail)
      );
    }

    localStorage.setItem('token', data.access_token);
    localStorage.setItem('user', JSON.stringify(data.user));

    showAlert('Login successful!', 'success');

    setTimeout(() => {
      window.location.href = '/dashboard';
    }, 1000);

  } catch (error) {
    console.error(error);
    showAlert(error.message || 'Cannot connect to server');
  } finally {
    btn.disabled = false;
    spinner.style.display = 'none';
    btnText.textContent = 'Sign In';
  }
}
</script>
</body>
</html>
